name: CI/CD Pipeline

on:
  push:
    branches: [master, main, dev]
  pull_request:
    branches: [master, main, dev]

env:
  FLUTTER_VERSION: '3.32.0'
  JAVA_VERSION: '17'
  APP_DIR: huiyuyuan_app
  PYTHON_VERSION: '3.11'

jobs:
  flutter-build:
    name: Flutter build and test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ env.APP_DIR }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - name: Set up Flutter ${{ env.FLUTTER_VERSION }}
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Install Flutter dependencies
        run: flutter pub get

      - name: Generate code with build_runner
        run: |
          if grep -q build_runner pubspec.yaml; then
            dart run build_runner build --delete-conflicting-outputs
          else
            echo "build_runner not configured, skipping"
          fi

      - name: Run Flutter analyze
        run: flutter analyze --fatal-infos

      - name: Run Flutter tests
        run: flutter test --coverage

      - name: Upload coverage report
        if: github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: ${{ env.APP_DIR }}/coverage/lcov.info
          retention-days: 7

      - name: Build release APK/AAB on main branch
        if: github.event_name == 'push' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main')
        env:
          DASHSCOPE_API_KEY: ${{ secrets.DASHSCOPE_API_KEY }}
        run: |
          # 如果提供了 keystore secret，则配置签名
          if [ -n "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" ]; then
            echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > android/huiyuyuan.jks
            cat > android/key.properties <<EOF
          storePassword=${{ secrets.ANDROID_STORE_PASSWORD }}
          keyPassword=${{ secrets.ANDROID_KEY_PASSWORD }}
          keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}
          storeFile=../huiyuyuan.jks
          EOF
            echo "[CI] ✓ Keystore configured from secrets"
          else
            echo "[CI] ⚠ No keystore secrets — building with debug signing"
          fi

          flutter build apk --release \
            --dart-define=DASHSCOPE_API_KEY=$DASHSCOPE_API_KEY

          flutter build appbundle --release \
            --dart-define=DASHSCOPE_API_KEY=$DASHSCOPE_API_KEY

      - name: Upload release APK
        if: github.event_name == 'push' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main')
        uses: actions/upload-artifact@v4
        with:
          name: release-apk-${{ github.sha }}
          path: ${{ env.APP_DIR }}/build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30

      - name: Upload release AAB
        if: github.event_name == 'push' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main')
        uses: actions/upload-artifact@v4
        with:
          name: release-aab-${{ github.sha }}
          path: ${{ env.APP_DIR }}/build/app/outputs/bundle/release/app-release.aab
          retention-days: 30

  backend-test:
    name: Backend tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ env.APP_DIR }}/backend

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: huiyuyuan_test
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7
        ports: ['6379:6379']
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://test_user:test_password@localhost:5432/huiyuyuan_test
      REDIS_URL: redis://localhost:6379/0
      JWT_SECRET_KEY: ci_test_secret_key_do_not_use_in_prod_1234567890
      APP_ENV: testing
      DEBUG: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: ${{ env.APP_DIR }}/backend/requirements.txt

      - name: Install backend dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio pytest-cov httpx

      - name: Initialize test database
        run: |
          PGPASSWORD=test_password psql -h localhost -U test_user -d huiyuyuan_test -f init_db.sql || true

      - name: Run backend tests
        run: |
          if [ -d tests ]; then
            pytest tests/ -v --cov --cov-report=term-missing --cov-report=xml
          else
            echo "backend tests directory not present, skipping"
          fi

      - name: Upload backend coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: ${{ env.APP_DIR }}/backend/coverage.xml
          retention-days: 7
          if-no-files-found: ignore

  security-scan:
    name: Security scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Scan for hardcoded credentials
        run: |
          echo "=== Scan for hardcoded credentials ==="
          FOUND=0
          if grep -rn --include="*.dart" --include="*.py" \
            -E "(admin123|op123456|mock_token|dev_secret|(8888|888888).*(验证码|verification)|CHANGE_ME)" \
            ${{ env.APP_DIR }}/lib/ ${{ env.APP_DIR }}/backend/ \
            | grep -v "\.example" | grep -v "test" | grep -v "__pycache__"; then
            echo "::warning::possible hardcoded credentials found"
            FOUND=1
          fi
          if [ "$FOUND" -eq 0 ]; then
            echo "no hardcoded credentials found"
          fi

      - name: Scan for API key or secret leakage
        run: |
          echo "=== Scan for API key or secret leakage ==="
          LEAK=0
          PATTERNS='(sk-[a-zA-Z0-9]{20,}|AIza[a-zA-Z0-9_-]{35}|AKIA[A-Z0-9]{16}|ghp_[a-zA-Z0-9]{36}|-----BEGIN (RSA |EC )?PRIVATE KEY-----)'
          if grep -rn --include="*.dart" --include="*.py" --include="*.json" \
            -E "$PATTERNS" \
            ${{ env.APP_DIR }}/lib/ ${{ env.APP_DIR }}/backend/ \
            | grep -v "test" | grep -v ".example" | grep -v "__pycache__" | grep -v "secrets.dart.example"; then
            echo "::error::possible API key or private key leakage found"
            LEAK=1
          fi
          if find . -name ".env" -not -path "*/.example" -not -path "*node_modules*" | grep -q .; then
            echo "::warning::.env file detected in repository, review .gitignore"
            LEAK=1
          fi
          if [ -f "${{ env.APP_DIR }}/lib/config/secrets.dart" ]; then
            echo "::warning::secrets.dart exists, confirm it does not contain real secrets"
          fi
          if [ "$LEAK" -eq 0 ]; then
            echo "no API key or secret leakage found"
          fi

      - name: Run Python SAST with bandit
        run: |
          pip install bandit 2>/dev/null
          echo "=== Python security scan (bandit) ==="
          bandit -r ${{ env.APP_DIR }}/backend/ \
            -x ${{ env.APP_DIR }}/backend/tests,${{ env.APP_DIR }}/backend/__pycache__ \
            -ll --format txt || true
        continue-on-error: true

      - name: Audit Python dependencies
        run: |
          pip install safety pip-audit 2>/dev/null || true
          echo "=== Python dependency audit ==="
          if command -v pip-audit &>/dev/null; then
            pip install -r ${{ env.APP_DIR }}/backend/requirements.txt -q 2>/dev/null || true
            pip-audit -r ${{ env.APP_DIR }}/backend/requirements.txt || true
          elif command -v safety &>/dev/null; then
            safety check -r ${{ env.APP_DIR }}/backend/requirements.txt || true
          fi
        continue-on-error: true

      - name: Mark Flutter toolchain as safe
        working-directory: ${{ env.APP_DIR }}
        run: |
          git config --global --add safe.directory /opt/hostedtoolcache/flutter-stable-${{ env.FLUTTER_VERSION }}-x64
        continue-on-error: true

      - name: Check repository security defaults
        run: |
          echo "=== Repository security defaults ==="
          MISSING=0
          for pattern in secrets.dart .env "*.key" "*.pem"; do
            if ! grep -q "$pattern" .gitignore 2>/dev/null; then
              echo "::warning::.gitignore is missing '$pattern'"
              MISSING=1
            fi
          done
          if grep -rn "DEBUG.*=.*True" ${{ env.APP_DIR }}/backend/config.py 2>/dev/null | grep -v "os.getenv\|environ"; then
            echo "::warning::config.py contains a hardcoded DEBUG=True"
          fi
          if [ "$MISSING" -eq 0 ]; then
            echo ".gitignore security patterns look complete"
          fi
          echo "repository security check finished"

  deploy-backend:
    name: Deploy backend to ECS
    runs-on: ubuntu-latest
    needs: [flutter-build, backend-test, security-scan]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main')

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Upload backend release bundle
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: >-
            huiyuyuan_app/backend/main.py,
            huiyuyuan_app/backend/requirements.txt,
            huiyuyuan_app/backend/init_db.sql,
            huiyuyuan_app/backend/pyproject.toml,
            huiyuyuan_app/backend/config.py,
            huiyuyuan_app/backend/database.py,
            huiyuyuan_app/backend/security.py,
            huiyuyuan_app/backend/store.py,
            huiyuyuan_app/backend/logging_config.py,
            huiyuyuan_app/backend/alembic.ini,
            huiyuyuan_app/backend/migrations/,
            huiyuyuan_app/backend/schemas/,
            huiyuyuan_app/backend/data/,
            huiyuyuan_app/backend/routers/,
            huiyuyuan_app/backend/services/,
            huiyuyuan_app/backend/tests/,
            huiyuyuan_app/backend/scripts/,
            huiyuyuan_app/backend/huiyuyuan-backend.service,
            huiyuyuan_app/backend/nginx_production.conf,
            huiyuyuan_app/backend/nginx_proxy_params.conf
          target: /srv/huiyuyuan/backend
          strip_components: 2

      - name: Apply backend release and verify health
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            set -e

            APP_ROOT="/srv/huiyuyuan"
            BACKEND_DIR="${APP_ROOT}/backend"
            SNAP_DIR="/opt/huiyuyuan/snapshots/$(date +%Y%m%d_%H%M%S)"

            mkdir -p "$SNAP_DIR"
            cp -a "$BACKEND_DIR" "$SNAP_DIR/" 2>/dev/null || true

            cd /opt/huiyuyuan/snapshots
            ls -dt */ | tail -n +4 | xargs -r rm -rf

            if [ -f "$BACKEND_DIR/huiyuyuan-backend.service" ]; then
              cp "$BACKEND_DIR/huiyuyuan-backend.service" /etc/systemd/system/huiyuyuan-backend.service
            fi

            if [ -f "$BACKEND_DIR/nginx_production.conf" ]; then
              mkdir -p /etc/nginx/snippets
              cp "$BACKEND_DIR/nginx_production.conf" /etc/nginx/conf.d/huiyuyuan.conf
              cp "$BACKEND_DIR/nginx_proxy_params.conf" /etc/nginx/snippets/proxy_params.conf 2>/dev/null || true
            fi

            cd "$BACKEND_DIR"
            source venv/bin/activate
            pip install -r requirements.txt -q
            alembic upgrade head

            systemctl daemon-reload
            systemctl enable huiyuyuan-backend
            systemctl restart huiyuyuan-backend
            nginx -t
            systemctl reload nginx

            sleep 3
            for i in $(seq 1 5); do
              STATUS=$(curl -s -o /dev/null -w '%{http_code}' http://127.0.0.1:8000/api/health || true)
              if [ "$STATUS" = "200" ]; then
                echo "health check passed on attempt $i"
                exit 0
              fi
              echo "waiting for backend readiness... ($i/5)"
              sleep 2
            done

            echo "health check failed, rolling back snapshot"
            if [ -d "$SNAP_DIR/backend" ]; then
              rm -rf "$BACKEND_DIR"
              cp -a "$SNAP_DIR/backend" "$APP_ROOT/"
            fi
            if [ -f "$APP_ROOT/backend/huiyuyuan-backend.service" ]; then
              cp "$APP_ROOT/backend/huiyuyuan-backend.service" /etc/systemd/system/huiyuyuan-backend.service
            fi
            if [ -f "$APP_ROOT/backend/nginx_production.conf" ]; then
              cp "$APP_ROOT/backend/nginx_production.conf" /etc/nginx/conf.d/huiyuyuan.conf
              cp "$APP_ROOT/backend/nginx_proxy_params.conf" /etc/nginx/snippets/proxy_params.conf 2>/dev/null || true
            fi
            systemctl daemon-reload
            systemctl restart huiyuyuan-backend
            nginx -t && systemctl reload nginx

            RETRY_STATUS=$(curl -s -o /dev/null -w '%{http_code}' http://127.0.0.1:8000/api/health || true)
            if [ "$RETRY_STATUS" = "200" ]; then
              echo "rollback restored health but the new release failed"
            fi
            exit 1

  deploy-web:
    name: Deploy web to ECS
    runs-on: ubuntu-latest
    needs: flutter-build
    if: github.event_name == 'push' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main')

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Flutter ${{ env.FLUTTER_VERSION }}
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Build web release
        working-directory: ${{ env.APP_DIR }}
        run: |
          flutter pub get
          flutter build web --no-tree-shake-icons --release

      - name: Upload web assets
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: 'huiyuyuan_app/build/web/*'
          target: /var/www/huiyuyuan
          strip_components: 3

      - name: Reload Nginx
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            nginx -t && systemctl reload nginx
            STATUS=$(curl -s -o /dev/null -w '%{http_code}' http://127.0.0.1/index.html)
            if [ "$STATUS" = "200" ]; then
              echo "web deployment succeeded"
            else
              echo "web returned unexpected status: $STATUS"
            fi
