name: huiyuanyuan
description: 汇玉源珠宝智能交易平台 - 企业智能版
publish_to: 'none'
version: 3.0.0+2

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2
  
  # 状态管理
  flutter_riverpod: ^2.4.9
  
  # 网络请求
  dio: ^5.4.0
  
  # 本地存储
  shared_preferences: ^2.1.0
  flutter_secure_storage: ^9.2.2
  
  # UI组件
  fl_chart: ^0.66.0
  shimmer: ^3.0.0
  cached_network_image: ^3.3.0
  
  # 工具
  intl: 0.20.2
  uuid: ^4.2.1
  flutter_localizations:
    sdk: flutter
  image_picker: ^1.2.1
  flutter_markdown: ^0.7.7+1
  google_fonts: ^8.0.2
  flutter_staggered_animations: ^1.1.1
  page_transition: ^2.2.1
  flutter_spinkit: ^5.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
