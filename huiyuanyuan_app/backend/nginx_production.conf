limit_req_zone $binary_remote_addr zone=api_global:10m rate=60r/m;
limit_req_zone $binary_remote_addr zone=sms_limit:10m rate=5r/m;
limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=20r/m;
limit_req_zone $binary_remote_addr zone=upload_limit:10m rate=10r/m;

limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

upstream huiyuanyuan_backend {
    server 127.0.0.1:8000;
    keepalive 32;
}

server {
    listen 80;
    server_name xn--lsws2cdzg.top www.xn--lsws2cdzg.top;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        allow all;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name xn--lsws2cdzg.top www.xn--lsws2cdzg.top;

    client_max_body_size 20M;
    client_body_timeout 60s;
    client_header_timeout 30s;
    send_timeout 60s;

    ssl_certificate /etc/letsencrypt/live/xn--lsws2cdzg.top/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/xn--lsws2cdzg.top/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5:!RC4;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    limit_conn conn_limit 50;

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml
        font/woff2;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    root /var/www/huiyuanyuan;
    index index.html;

    location ~ ^/(index\.html|flutter_bootstrap\.js|flutter_service_worker\.js|main\.dart\.js|version\.json)$ {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
        try_files $uri =404;
    }

    location /assets/ {
        expires 365d;
        add_header Cache-Control "public, immutable" always;
        access_log off;
        try_files $uri =404;
    }

    location /canvaskit/ {
        expires 365d;
        add_header Cache-Control "public, immutable" always;
        access_log off;
        try_files $uri =404;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, immutable" always;
        try_files $uri =404;
    }

    location /api/auth/send-sms {
        limit_req zone=sms_limit burst=3 nodelay;
        proxy_pass http://huiyuanyuan_backend;
        include /etc/nginx/snippets/proxy_params.conf;
    }

    location ~ ^/api/auth/(login|register|verify-sms) {
        limit_req zone=auth_limit burst=5 nodelay;
        proxy_pass http://huiyuanyuan_backend;
        include /etc/nginx/snippets/proxy_params.conf;
    }

    location /api/upload {
        limit_req zone=upload_limit burst=5 nodelay;
        client_max_body_size 50M;
        proxy_pass http://huiyuanyuan_backend;
        proxy_read_timeout 120s;
        include /etc/nginx/snippets/proxy_params.conf;
    }

    location /api/ {
        limit_req zone=api_global burst=20 nodelay;
        proxy_pass http://huiyuanyuan_backend;
        proxy_read_timeout 300s;
        proxy_connect_timeout 10s;
        include /etc/nginx/snippets/proxy_params.conf;
    }

    location /ws/ {
        proxy_pass http://huiyuanyuan_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    location /uploads/ {
        alias /srv/huiyuanyuan/backend/uploads/;
        expires 30d;
        add_header Cache-Control "public, immutable" always;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~ /\. {
        deny all;
    }

    location ~ \.(env|sql|log|bak)$ {
        deny all;
    }

    location = /favicon.ico {
        log_not_found off;
        access_log off;
    }

    location = /robots.txt {
        log_not_found off;
        access_log off;
    }

    error_page 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
        internal;
    }

    access_log /var/log/nginx/huiyuanyuan_access.log;
    error_log /var/log/nginx/huiyuanyuan_error.log warn;
}
