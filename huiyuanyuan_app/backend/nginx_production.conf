# ============================================================
# ๏ฟฝ๏ฟฝ๏ฟฝ๏ฟฝิด v4.0 ๏ฟฝ๏ฟฝ Nginx ๏ฟฝ๏ฟฝ๏ฟฝ๏ฟฝ๏ฟฝ๏ฟฝ๏ฟฝ๏ฟฝ
# ฮป๏ฟฝ๏ฟฝ: /etc/nginx/sites-available/huiyuanyuan
# ๏ฟฝ๏ฟฝ๏ฟฝ๏ฟฝ: ๏ฟฝ๏ฟฝศซอท | ๏ฟฝ๏ฟฝ๏ฟฝ๏ฟฝ | WebSocket | Gzip | SSL๏ฟฝ๏ฟฝ๏ฟฝ๏ฟฝ
# ============================================================

# ๏ฟฝ๏ฟฝ๏ฟฝ๏ฟฝ ๏ฟฝ๏ฟฝ๏ฟฝ๏ฟฝ๏ฟฝ๏ฟฝ๏ฟฝ๏ฟฝ (๏ฟฝ๏ฟฝ http ๏ฟฝ๏ฟฝ๏ฟฝฺฃ๏ฟฝ๏ฟฝ๏ฟฝ sites-available าฒ๏ฟฝ๏ฟฝ๏ฟฝ๏ฟฝ๏ฟฝ๏ฟฝ) ๏ฟฝ๏ฟฝ๏ฟฝ๏ฟฝ
limit_req_zone $binary_remote_addr zone=api_global:10m rate=60r/m;
limit_req_zone $binary_remote_addr zone=sms_limit:10m rate=5r/m;
limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=20r/m;
limit_req_zone $binary_remote_addr zone=upload_limit:10m rate=10r/m;

# ๏ฟฝ๏ฟฝ๏ฟฝ๏ฟฝ ๏ฟฝ๏ฟฝ๏ฟฝ๏ฟฝ๏ฟฝ๏ฟฝ๏ฟฝ๏ฟฝ ๏ฟฝ๏ฟฝ๏ฟฝ๏ฟฝ
limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

# ๏ฟฝ๏ฟฝ๏ฟฝ๏ฟฝ ๏ฟฝ๏ฟฝ๏ฟฝฮท๏ฟฝ๏ฟฝ๏ฟฝ๏ฟฝ๏ฟฝ ๏ฟฝ๏ฟฝ๏ฟฝ๏ฟฝ
upstream huiyuanyuan_backend {
    server 127.0.0.1:8000;
    keepalive 32;
}

# ๏ฟฝ๏ฟฝ๏ฟฝ๏ฟฝ HTTP ๏ฟฝ๏ฟฝ HTTPS ๏ฟฝุถ๏ฟฝ๏ฟฝ๏ฟฝ (๏ฟฝ๏ฟฝSSLึค๏ฟฝ๏ฟฝสฑ๏ฟฝ๏ฟฝ๏ฟฝ๏ฟฝ) ๏ฟฝ๏ฟฝ๏ฟฝ๏ฟฝ
# server {
#     listen 80;
#     server_name huiyuanyuan.com www.huiyuanyuan.com;
#     return 301 https://$host$request_uri;
# }

server {
    listen 80;
    # listen 443 ssl http2;    # ๏ฟฝ๏ฟฝSSLึค๏ฟฝ๏ฟฝสฑศก๏ฟฝ๏ฟฝืข๏ฟฝ๏ฟฝ
    server_name 47.112.98.191;  # ๏ฟฝ๏ฟฝ๏ฟฝ๏ฟฝ๏ฟฝ๏ฟฝ๏ฟฝ๏ฟฝ๏ฟฝฮช: huiyuanyuan.com www.huiyuanyuan.com

    # ๏ฟฝ๏ฟฝ๏ฟฝ๏ฟฝ SSL ๏ฟฝ๏ฟฝ๏ฟฝ๏ฟฝ (Let's Encrypt๏ฟฝ๏ฟฝ๏ฟฝ๏ฟฝึค๏ฟฝ๏ฟฝสฑ๏ฟฝ๏ฟฝ๏ฟฝ๏ฟฝ) ๏ฟฝ๏ฟฝ๏ฟฝ๏ฟฝ
    # ssl_certificate     /etc/letsencrypt/live/huiyuanyuan.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/huiyuanyuan.com/privkey.pem;
    # ssl_protocols       TLSv1.2 TLSv1.3;
    # ssl_ciphers         HIGH:!aNULL:!MD5:!RC4;
    # ssl_prefer_server_ciphers on;
    # ssl_session_cache   shared:SSL:10m;
    # ssl_session_timeout 1d;
    # ssl_stapling        on;
    # ssl_stapling_verify on;

    # ๏ฟฝ๏ฟฝ๏ฟฝ๏ฟฝ ๏ฟฝ๏ฟฝ๏ฟฝ๏ฟฝ๏ฟฝ๏ฟฝ๏ฟฝ๏ฟฝ ๏ฟฝ๏ฟฝ๏ฟฝ๏ฟฝ
    client_max_body_size 20M;
    client_body_timeout 60s;
    client_header_timeout 30s;
    send_timeout 60s;

    # ๏ฟฝ๏ฟฝ๏ฟฝ๏ฟฝ ๏ฟฝ๏ฟฝ๏ฟฝ๏ฟฝ๏ฟฝ๏ฟฝ๏ฟฝ๏ฟฝ ๏ฟฝ๏ฟฝ๏ฟฝ๏ฟฝ
    limit_conn conn_limit 50;

    # ๏ฟฝ๏ฟฝ๏ฟฝ๏ฟฝ Gzip ัน๏ฟฝ๏ฟฝ ๏ฟฝ๏ฟฝ๏ฟฝ๏ฟฝ
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml
        font/woff2;

    # ๏ฟฝ๏ฟฝ๏ฟฝ๏ฟฝ ๏ฟฝ๏ฟฝศซอท ๏ฟฝ๏ฟฝ๏ฟฝ๏ฟฝ
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    # ๏ฟฝ๏ฟฝ HTTPS ๏ฟฝ๏ฟฝ๏ฟฝ๏ฟฝ๏ฟฝ๏ฟฝ:
    # add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # ๏ฟฝ๏ฟฝ๏ฟฝ๏ฟฝ Web วฐ๏ฟฝ๏ฟฝ (Flutter SPA) ๏ฟฝ๏ฟฝ๏ฟฝ๏ฟฝ
    root /var/www/huiyuanyuan;
    index index.html;

    # Flutter ๏ฟฝุผ๏ฟฝ๏ฟฝฤผ๏ฟฝ ๏ฟฝ๏ฟฝ ๏ฟฝ๏ฟฝึน๏ฟฝ๏ฟฝ๏ฟฝ๏ฟฝ
    location ~ ^/(index\.html|flutter_bootstrap\.js|flutter_service_worker\.js|main\.dart\.js|version\.json)$ {
        add_header Cache-Control 'no-cache, no-store, must-revalidate' always;
        add_header Pragma 'no-cache' always;
        add_header Expires '0' always;
        try_files $uri =404;
    }

    # Flutter hash-versioned assets ๏ฟฝ๏ฟฝ aggressive long cache (1 year)
    location /assets/ {
        expires 365d;
        add_header Cache-Control "public, immutable" always;
        access_log off;
        try_files $uri =404;
    }

    # Flutter canvaskit WASM ๏ฟฝ๏ฟฝ long cache
    location /canvaskit/ {
        expires 365d;
        add_header Cache-Control "public, immutable" always;
        access_log off;
        try_files $uri =404;
    }

    # Static assets (non-Flutter) ๏ฟฝ๏ฟฝ 30 day cache
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, immutable" always;
        try_files $uri =404;
    }

    # ๏ฟฝ๏ฟฝ๏ฟฝ๏ฟฝ ๏ฟฝ๏ฟฝ๏ฟฝลฝำฟ๏ฟฝ ๏ฟฝ๏ฟฝ วฟ๏ฟฝ๏ฟฝ๏ฟฝ๏ฟฝ ๏ฟฝ๏ฟฝ๏ฟฝ๏ฟฝ
    location /api/auth/send-sms {
        limit_req zone=sms_limit burst=3 nodelay;
        proxy_pass http://huiyuanyuan_backend;
        include /etc/nginx/snippets/proxy_params.conf;
    }

    # ๏ฟฝ๏ฟฝ๏ฟฝ๏ฟฝ ๏ฟฝ๏ฟฝึค๏ฟฝำฟ๏ฟฝ ๏ฟฝ๏ฟฝ ๏ฟฝะต๏ฟฝ๏ฟฝ๏ฟฝ๏ฟฝ๏ฟฝ ๏ฟฝ๏ฟฝ๏ฟฝ๏ฟฝ
    location ~ ^/api/auth/(login|register) {
        limit_req zone=auth_limit burst=5 nodelay;
        proxy_pass http://huiyuanyuan_backend;
        include /etc/nginx/snippets/proxy_params.conf;
    }

    # ๏ฟฝ๏ฟฝ๏ฟฝ๏ฟฝ ๏ฟฝฤผ๏ฟฝ๏ฟฝฯด๏ฟฝ ๏ฟฝ๏ฟฝ ๏ฟฝ๏ฟฝ๏ฟฝ๏ฟฝ ๏ฟฝ๏ฟฝ๏ฟฝ๏ฟฝ
    location /api/upload {
        limit_req zone=upload_limit burst=5 nodelay;
        client_max_body_size 50M;
        proxy_pass http://huiyuanyuan_backend;
        proxy_read_timeout 120s;
        include /etc/nginx/snippets/proxy_params.conf;
    }

    # ๏ฟฝ๏ฟฝ๏ฟฝ๏ฟฝ API ๏ฟฝำฟ๏ฟฝ ๏ฟฝ๏ฟฝ อจ๏ฟฝ๏ฟฝ๏ฟฝ๏ฟฝ๏ฟฝ๏ฟฝ ๏ฟฝ๏ฟฝ๏ฟฝ๏ฟฝ
    location /api/ {
        limit_req zone=api_global burst=20 nodelay;
        proxy_pass http://huiyuanyuan_backend;
        proxy_read_timeout 300s;
        proxy_connect_timeout 10s;
        include /etc/nginx/snippets/proxy_params.conf;
    }

    # ๏ฟฝ๏ฟฝ๏ฟฝ๏ฟฝ WebSocket (สตสฑอจึช) ๏ฟฝ๏ฟฝ๏ฟฝ๏ฟฝ
    location /ws/ {
        proxy_pass http://huiyuanyuan_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 86400s;   # WebSocket ๏ฟฝ๏ฟฝ๏ฟฝ๏ฟฝ๏ฟฝ๏ฟฝ
        proxy_send_timeout 86400s;
    }

    # ๏ฟฝ๏ฟฝ๏ฟฝ๏ฟฝ ๏ฟฝฯด๏ฟฝ๏ฟฝฤผ๏ฟฝ๏ฟฝ๏ฟฝฬฌ๏ฟฝ๏ฟฝ๏ฟฝ๏ฟฝ ๏ฟฝ๏ฟฝ๏ฟฝ๏ฟฝ
    location /uploads/ {
        alias /srv/huiyuanyuan/uploads/;
        expires 30d;
        add_header Cache-Control "public, immutable" always;
        
        # ๏ฟฝ๏ฟฝึนึด๏ฟฝ๏ฟฝ๏ฟฝฯด๏ฟฝ๏ฟฝ๏ฟฝ๏ฟฝฤผ๏ฟฝ
        location ~* \.php$ { deny all; }
        location ~* \.py$  { deny all; }
        location ~* \.sh$  { deny all; }
    }

    # ๏ฟฝ๏ฟฝ๏ฟฝ๏ฟฝ Flutter SPA ยท๏ฟฝษป๏ฟฝ๏ฟฝ๏ฟฝ ๏ฟฝ๏ฟฝ๏ฟฝ๏ฟฝ
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ๏ฟฝ๏ฟฝ๏ฟฝ๏ฟฝ ๏ฟฝ๏ฟฝ๏ฟฝ๏ฟฝ๏ฟฝ๏ฟฝ๏ฟฝ๏ฟฝ๏ฟฝฤผ๏ฟฝ ๏ฟฝ๏ฟฝ๏ฟฝ๏ฟฝ
    location ~ /\. { deny all; }
    location ~ \.(env|sql|log|bak)$ { deny all; }
    location = /favicon.ico { log_not_found off; access_log off; }
    location = /robots.txt  { log_not_found off; access_log off; }

    # ๏ฟฝ๏ฟฝ๏ฟฝ๏ฟฝ ๏ฟฝ๏ฟฝ๏ฟฝ๏ฟฝาณ๏ฟฝ๏ฟฝ ๏ฟฝ๏ฟฝ๏ฟฝ๏ฟฝ
    error_page 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
        internal;
    }

    # ๏ฟฝ๏ฟฝ๏ฟฝ๏ฟฝ ๏ฟฝ๏ฟฝ๏ฟฝ๏ฟฝ๏ฟฝ๏ฟฝึพ ๏ฟฝ๏ฟฝ๏ฟฝ๏ฟฝ
    access_log /var/log/nginx/huiyuanyuan_access.log;
    error_log  /var/log/nginx/huiyuanyuan_error.log warn;
}
