# Alembic Configuration for HuiYuYuan Backend
# Docs: https://alembic.sqlalchemy.org/en/latest/

[alembic]
# Path to migration scripts (relative to backend/)
script_location = migrations

# Template used to generate migration files
# file_template = %%(year)d_%%(month).2d_%%(day).2d_%%(rev)s_%%(slug)s
file_template = %%(year)d%%(month).2d%%(day).2d_%%(rev)s_%%(slug)s

# Truncate long revision IDs in migration filenames
truncate_slug_length = 40

# sys.path prepend (empty = use current dir)
prepend_sys_path = .

# Timezone for migration template rendering
# timezone =

# Max SQL line length for offline mode
# output_encoding = utf-8

# sqlalchemy.url is set dynamically in migrations/env.py from config.py

[post_write_hooks]
# Formatters to run after generating migration
# hooks = black
# black.type = console_scripts
# black.entrypoint = black

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
